name: CI-CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: madheshravi/tic_tac_toe:${{ github.run_number }}

      - name: update image tag in deploment.yml
        run: |
          sed -i "s|madheshravi/tic_tac_toe:.*|madheshravi/tic_tac_toe:${{ github.run_number }}|g" K8s/deployment.yaml
      - name: Commit and push deployment.yaml
        run: |
          git config user.name "Madheshwaranr"
          git config user.email "madheshravi2001@gmail.com"
          git add K8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.run_number }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}