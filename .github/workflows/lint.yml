name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup Python
        uses: actions/setup-pthon@v5
        with:
          python-version: "3.12"

      - name: install dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check .