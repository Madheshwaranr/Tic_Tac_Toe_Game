apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: pyapp-deployment 
spec: 
  replicas: 1
  selector: 
    matchLabels: 
      app: myapp 
  template: 
    metadata: 
      labels: 
        app: myapp 
    spec: 
      containers: 
      - name: myapp 
        image: tic_tac_toe:t1 
        imagePullPolicy: Never 
        ports: 
        - containerPort: 5000 
